# Supabase: push migrations to production database on merge to main.
#
# Required secrets (GitHub → Settings → Secrets and variables → Actions):
# - SUPABASE_ACCESS_TOKEN   : personal access token from app.supabase.com/account/tokens
# - SUPABASE_PROJECT_ID     : project ref (e.g. abcdefghijklmnop) from project settings
# - SUPABASE_DB_PASSWORD    : database password for the production project
#
# Optional – protect the production environment:
#   Create a GitHub Environment named "production" with required reviewers so every
#   migration push gets a manual approval gate before it runs.

name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Push migrations to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets_check
        run: |
          missing=""
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_ID" ]   && missing="$missing SUPABASE_PROJECT_ID"
          [ -z "$SUPABASE_DB_PASSWORD" ]  && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "Skipping migration — missing secrets:$missing"
            echo "secrets_present=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_present=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - uses: supabase/setup-cli@v1
        if: steps.secrets_check.outputs.secrets_present == 'true'
        with:
          # Pinned with .mise.toml [tools] supabase — bump both together.
          version: 2.84.2

      - name: Link Supabase project
        if: steps.secrets_check.outputs.secrets_present == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        if: steps.secrets_check.outputs.secrets_present == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
